<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bank Admin — Stranger to Friends</title>
    <meta name="description" content="Blood Bank Admin Dashboard — Manage your blood bank inventory for the district.">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        :root {
            --primary: #cc0000;
            --primary-hover: #b30000;
            --bg: #f5f7f8;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-muted: #666666;
            --success: #28a745;
            --danger: #dc3545;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 700px; }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .back-btn {
            background: #fff;
            color: var(--text-dark);
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: var(--transition);
        }
        .back-btn:hover { background: #eee; transform: translateY(-2px); }

        .dashboard-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            border: 1px solid rgba(0,0,0,0.03);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .page-title {
            text-align: center;
            color: var(--primary);
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .page-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Tabs */
        .tab-row {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 11px;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
        }
        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .tab-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 6px; color: var(--text-dark); }
        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 1.5px solid #ddd;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(204,0,0,0.08); }

        .submit-btn {
            width: 100%;
            margin-top: 6px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #e60000, #cc0000);
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }
        .submit-btn:hover { opacity: 0.9; transform: scale(1.01); }

        .msg { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-top: 14px; text-align: center; }
        .msg.success { background: #e6f9ed; color: #1a7a3a; border: 1px solid #b2dfca; }
        .msg.error   { background: #fff0f0; color: #cc0000; border: 1px solid #ffcccc; }

        /* Inventory grid */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ffebeb;
        }

        .bank-info-bar {
            background: #fff5f5;
            border: 1px solid #ffd6d6;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 22px;
            font-size: 13px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
        }
        .bank-info-bar strong { color: var(--primary); }
        .logout-btn {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .logout-btn:hover { background: var(--primary); color: #fff; }

        .blood-groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .bg-card {
            background: #fafafa;
            border: 1.5px solid #f0f0f0;
            border-radius: 14px;
            padding: 18px;
            transition: var(--transition);
        }
        .bg-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.06); transform: translateY(-2px); }
        .bg-card.unavailable { opacity: 0.55; border-color: #ddd; }

        .bg-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .blood-badge-lg {
            background: #ffe5e5;
            color: var(--primary);
            padding: 5px 13px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 17px;
            letter-spacing: 0.5px;
        }

        .avail-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .avail-toggle input[type="checkbox"] { accent-color: var(--primary); width: 15px; height: 15px; cursor: pointer; }

        .units-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .units-row input {
            flex: 1;
            padding: 9px 12px;
            border-radius: 9px;
            border: 1.5px solid #ddd;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .units-row input:focus { border-color: var(--primary); }
        .units-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

        .bg-card-actions { display: flex; gap: 8px; }

        .save-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .save-btn:hover { background: var(--primary-hover); }

        .remove-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            background: #fff0f0;
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .remove-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Status dot */
        .status-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .dot-green { background: #28a745; }
        .dot-red   { background: #dc3545; }

        .form-row { display: flex; gap: 14px; }
        .form-row .form-group { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <a href="STF login.html" class="back-btn">← Login Page</a>
        <a href="STF.html" class="back-btn">🏠 Home</a>
    </div>

    <div class="dashboard-card">
        <p class="page-title">🏥 Blood Bank Portal</p>
        <p class="page-subtitle">Register your blood bank or manage your inventory</p>

        <!-- Auth Section -->
        <div id="authSection">
            <div class="tab-row">
                <button class="tab-btn active" id="loginTabBtn" onclick="showTab('login')">Login</button>
                <button class="tab-btn" id="registerTabBtn" onclick="showTab('register')">Register New Bank</button>
            </div>

            <!-- Login Form -->
            <div id="loginTab">
                <form id="loginForm">
                    <div class="form-group">
                        <label>🏥 Blood Bank Name</label>
                        <input type="text" id="loginBankName" placeholder="Enter blood bank name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>📍 District</label>
                            <input type="text" id="loginDistrict" placeholder="e.g. Chennai">
                        </div>
                        <div class="form-group">
                            <label>🗺 State</label>
                            <input type="text" id="loginState" placeholder="e.g. Tamil Nadu">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>🔐 Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter admin password" required>
                    </div>
                    <button type="submit" class="submit-btn">🔓 Login to Blood Bank →</button>
                </form>
                <div id="loginMsg"></div>
            </div>

            <!-- Register Form -->
            <div id="registerTab" style="display:none;">
                <form id="registerForm">
                    <div class="form-group">
                        <label>🏥 Blood Bank Name</label>
                        <input type="text" id="regBankName" placeholder="Enter official blood bank name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>📍 District</label>
                            <input type="text" id="regDistrict" placeholder="e.g. Chennai" required>
                        </div>
                        <div class="form-group">
                            <label>🗺 State</label>
                            <input type="text" id="regState" placeholder="e.g. Tamil Nadu" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>📱 Contact Phone</label>
                        <input type="tel" id="regPhone" placeholder="10-digit phone number" required pattern="[0-9]{10}">
                    </div>
                    <div class="form-group">
                        <label>🏠 Address (optional)</label>
                        <input type="text" id="regAddress" placeholder="Full address of the blood bank">
                    </div>
                    <div class="form-group">
                        <label>🔐 Admin Password</label>
                        <input type="password" id="regPassword" placeholder="Create a secure password" required>
                    </div>
                    <button type="submit" class="submit-btn">✅ Register Blood Bank →</button>
                </form>
                <div id="registerMsg"></div>
            </div>
        </div>

        <!-- Inventory Management Section (shown after login) -->
        <div id="inventorySection" style="display:none;">
            <div class="bank-info-bar">
                <div>
                    <strong id="bankNameDisplay">—</strong>
                    <span style="color:var(--text-muted); margin-left:8px; font-size:12px;" id="bankLocationDisplay">—</span>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span style="font-size:12px;color:var(--text-muted);">📱 <span id="bankPhoneDisplay">—</span></span>
                    <button class="logout-btn" onclick="logoutBank()">Logout</button>
                </div>
            </div>

            <p class="section-title">🩸 Manage Blood Inventory</p>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
                Set the number of units available for each blood group. Uncheck "Available" to mark it as not available, or click "Remove" to delete it from your inventory.
            </p>

            <div class="blood-groups-grid" id="bloodGroupsGrid"></div>
            <div id="inventoryMsg"></div>
        </div>
    </div>
</div>

<script>
    const BASE_URL = (window.location.origin.startsWith('http') ? window.location.origin : 'http://localhost:5000') + '/api';
    const ALL_BLOOD_GROUPS = ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'];
    let currentBank = null;

    function showTab(tab) {
        document.getElementById('loginTab').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerTab').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('loginTabBtn').classList.toggle('active', tab === 'login');
        document.getElementById('registerTabBtn').classList.toggle('active', tab === 'register');
    }

    function showMsg(elId, text, type) {
        const el = document.getElementById(elId);
        el.innerHTML = `<div class="msg ${type}">${text}</div>`;
        setTimeout(() => { el.innerHTML = ''; }, 5000);
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const bankName = document.getElementById('loginBankName').value.trim();
        const district = document.getElementById('loginDistrict').value.trim();
        const state    = document.getElementById('loginState').value.trim();
        const password = document.getElementById('loginPassword').value;

        try {
            const res = await fetch(`${BASE_URL}/bloodbank/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bankName, district, state, password })
            });
            const data = await res.json();
            if (data.success) {
                currentBank = data.bank;
                sessionStorage.setItem('bloodBankSession', JSON.stringify(currentBank));
                showInventorySection();
            } else {
                showMsg('loginMsg', '❌ ' + data.error, 'error');
            }
        } catch (err) {
            showMsg('loginMsg', '❌ Network error. Is the server running?', 'error');
        }
    });

    // Register
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const bankName = document.getElementById('regBankName').value.trim();
        const district = document.getElementById('regDistrict').value.trim();
        const state    = document.getElementById('regState').value.trim();
        const phone    = document.getElementById('regPhone').value.trim();
        const address  = document.getElementById('regAddress').value.trim();
        const password = document.getElementById('regPassword').value;

        try {
            const res = await fetch(`${BASE_URL}/bloodbank/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bankName, district, state, phone, address, password })
            });
            const data = await res.json();
            if (data.success) {
                currentBank = data.bank;
                sessionStorage.setItem('bloodBankSession', JSON.stringify(currentBank));
                showInventorySection();
            } else {
                showMsg('registerMsg', '❌ ' + data.error, 'error');
            }
        } catch (err) {
            showMsg('registerMsg', '❌ Network error. Is the server running?', 'error');
        }
    });

    function showInventorySection() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('inventorySection').style.display = 'block';

        document.getElementById('bankNameDisplay').textContent = currentBank.bankName;
        document.getElementById('bankLocationDisplay').textContent = `${currentBank.district}, ${currentBank.state}`;
        document.getElementById('bankPhoneDisplay').textContent = currentBank.phone;

        renderInventoryGrid();
    }

    function renderInventoryGrid() {
        const grid = document.getElementById('bloodGroupsGrid');
        grid.innerHTML = '';

        ALL_BLOOD_GROUPS.forEach(bg => {
            const existing = currentBank.inventory.find(i => i.bloodGroup === bg);
            const units     = existing ? existing.units : 0;
            const available = existing ? existing.available : true;
            const inDB      = !!existing;

            const card = document.createElement('div');
            card.className = 'bg-card' + (!available ? ' unavailable' : '');
            card.id = `card-${bg.replace('+','P').replace('-','N')}`;

            card.innerHTML = `
                <div class="bg-card-header">
                    <span class="blood-badge-lg">🩸 ${bg}</span>
                    <label class="avail-toggle">
                        <input type="checkbox" id="avail-${bg.replace('+','P').replace('-','N')}"
                            ${available ? 'checked' : ''}
                            onchange="toggleAvail('${bg}')">
                        Available
                    </label>
                </div>
                <div class="units-row">
                    <label>Units:</label>
                    <input type="number" id="units-${bg.replace('+','P').replace('-','N')}"
                        value="${units}" min="0" placeholder="0">
                </div>
                <div class="bg-card-actions">
                    <button class="save-btn" onclick="saveInventory('${bg}')">💾 Save</button>
                    ${inDB ? `<button class="remove-btn" onclick="removeBloodGroup('${bg}')">🗑 Remove</button>` : ''}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function toggleAvail(bg) {
        const key = bg.replace('+','P').replace('-','N');
        const card = document.getElementById(`card-${key}`);
        const checked = document.getElementById(`avail-${key}`).checked;
        card.classList.toggle('unavailable', !checked);
    }

    async function saveInventory(bg) {
        const key       = bg.replace('+','P').replace('-','N');
        const units     = parseInt(document.getElementById(`units-${key}`).value) || 0;
        const available = document.getElementById(`avail-${key}`).checked;

        try {
            const res = await fetch(`${BASE_URL}/bloodbank/${currentBank._id}/inventory`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bloodGroup: bg, units, available })
            });
            const data = await res.json();
            if (data.success) {
                currentBank.inventory = data.inventory;
                sessionStorage.setItem('bloodBankSession', JSON.stringify(currentBank));
                renderInventoryGrid();
                showMsg('inventoryMsg', `✅ ${bg} inventory saved successfully!`, 'success');
            } else {
                showMsg('inventoryMsg', '❌ ' + data.error, 'error');
            }
        } catch (err) {
            showMsg('inventoryMsg', '❌ Network error saving inventory.', 'error');
        }
    }

    async function removeBloodGroup(bg) {
        if (!confirm(`Remove ${bg} from your blood bank inventory? This cannot be undone.`)) return;
        try {
            const res = await fetch(`${BASE_URL}/bloodbank/${currentBank._id}/inventory/${encodeURIComponent(bg)}`, {
                method: 'DELETE'
            });
            const data = await res.json();
            if (data.success) {
                currentBank.inventory = data.inventory;
                sessionStorage.setItem('bloodBankSession', JSON.stringify(currentBank));
                renderInventoryGrid();
                showMsg('inventoryMsg', `✅ ${bg} removed from inventory.`, 'success');
            } else {
                showMsg('inventoryMsg', '❌ ' + data.error, 'error');
            }
        } catch (err) {
            showMsg('inventoryMsg', '❌ Network error removing blood group.', 'error');
        }
    }

    function logoutBank() {
        sessionStorage.removeItem('bloodBankSession');
        currentBank = null;
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('inventorySection').style.display = 'none';
        document.getElementById('loginForm').reset();
    }

    // Auto-restore session
    window.addEventListener('DOMContentLoaded', () => {
        const saved = sessionStorage.getItem('bloodBankSession');
        if (saved) {
            try {
                currentBank = JSON.parse(saved);
                showInventorySection();
            } catch (e) {
                sessionStorage.removeItem('bloodBankSession');
            }
        }
    });
</script>
</body>
</html>
